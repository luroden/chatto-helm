apiVersion: v2
name: chatto
description: A Helm chart for Chatto — a self-hosted chat application for teams and communities, backed by NATS JetStream.
type: application

# This is the chart version. It is independent of Chatto's own version and is
# bumped on every change to the chart itself (SemVer).
version: 0.1.3

# The default Chatto version this chart deploys. Kept in sync with the pinned
# image tag in values.yaml (image.tag). Bump both together.
appVersion: "0.4.2"

home: https://chatto.run
sources:
  - https://github.com/chattocorp/chatto
  - https://github.com/luroden/chatto-helm
icon: https://raw.githubusercontent.com/chattocorp/chatto/main/favicon.png

keywords:
  - chatto
  - chat
  - messaging
  - collaboration
  - nats
  - jetstream

maintainers:
  - name: luroden
    url: https://github.com/luroden

annotations:
  # Rendered by artifacthub.io and some UIs. Chatto's server is AGPL; this
  # chart is Apache-2.0 (see LICENSE), matching Chatto's example/integration
  # licensing boundary.
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Chatto documentation
      url: https://docs.chatto.run
    - name: Chatto source
      url: https://github.com/chattocorp/chatto
    - name: Chart source
      url: https://github.com/luroden/chatto-helm

  # Artifact Hub guesses a category when this is unset. "streaming-messaging"
  # is the closest of its fixed set for a chat server on JetStream.
  artifacthub.io/category: streaming-messaging

  # Drives Artifact Hub's security report. Only the image this chart pins is
  # listed; the nats and livekit images come from subcharts, which Artifact Hub
  # scans separately via their own listings. Must be an explicit tag, so keep
  # this in sync with appVersion and values.yaml image.tag.
  artifacthub.io/images: |
    - name: chatto
      image: ghcr.io/chattocorp/chatto:0.4.2

  # Renders as the changelog for this chart version. Reset on every version bump.
  artifacthub.io/changes: |
    - kind: fixed
      description: chatto.assets.s3.pathStyle no longer crashes the server at startup; auto/virtual/path are translated to the boolean Chatto expects
    - kind: fixed
      description: The startup probe budget now covers a cold start, which previously killed pods while they created JetStream streams
    - kind: added
      description: values.schema.json validates chatto.assets.s3.pathStyle and useSSL

dependencies:
  # NATS JetStream is Chatto's primary data store. Enabled by default so a
  # fresh `helm install` yields a working, clustered deployment. Disable it
  # (nats.enabled=false) to connect Chatto to an externally managed NATS.
  - name: nats
    version: 2.14.2
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled

  # LiveKit powers optional voice/video calls. Disabled by default: a usable
  # LiveKit deployment needs UDP media/TURN networking that most clusters do
  # not provide out of the box. See values.yaml and docs for guidance.
  - name: livekit-server
    version: 1.9.0
    repository: https://helm.livekit.io
    alias: livekit
    condition: livekit.enabled
