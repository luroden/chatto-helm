apiVersion: v1
kind: Pod
metadata:
  name: {{ include "chatto.fullname" . }}-test-connection
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: readyz
      image: curlimages/curl:8.11.0
      command: ["curl"]
      args:
        - "-sf"
        - "--retry"
        - "10"
        - "--retry-connrefused"
        - "--retry-delay"
        - "3"
        - "http://{{ include "chatto.fullname" . }}:{{ .Values.service.port }}/readyz"
