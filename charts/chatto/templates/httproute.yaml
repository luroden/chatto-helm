{{- if .Values.httpRoute.enabled }}
{{- $parentRefs := .Values.httpRoute.parentRefs }}
{{- if and (not $parentRefs) (not .Values.gateway.enabled) }}
{{- fail "httpRoute.enabled=true needs somewhere to attach: set httpRoute.parentRefs to an existing Gateway, or gateway.enabled=true to have the chart create one." }}
{{- end }}
{{- $hostnames := include "chatto.httpRouteHostnames" . | fromYamlArray }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chatto.fullname" . }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if $parentRefs }}
    {{- toYaml $parentRefs | nindent 4 }}
    {{- else }}
    - name: {{ include "chatto.fullname" . }}
      namespace: {{ .Release.Namespace }}
    {{- end }}
  {{- if $hostnames }}
  hostnames:
    {{- range $hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    - matches:
        {{- toYaml .Values.httpRoute.matches | nindent 8 }}
      {{- with .Values.httpRoute.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.httpRoute.timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "chatto.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
