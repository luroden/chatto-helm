{{- if eq (include "chatto.manageNatsSecret" .) "true" }}
{{- $name := include "chatto.natsSecretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) -}}
{{- $prev := dict -}}
{{- if $existing }}{{- $prev = $existing.data -}}{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.nats.enabled }}
  {{- /* Bundled NATS: shared token, auto-generated and persisted if blank. */}}
  token: {{ include "chatto.reuseOrGen" (dict "prev" $prev "key" "token" "provided" .Values.natsAuth.token) | quote }}
  {{- else }}
  {{- /* External NATS with inline credentials. */}}
  {{- $auth := .Values.externalNats.auth }}
  {{- if eq $auth.method "token" }}
  token: {{ required "externalNats.auth.token is required for method=token" $auth.token | quote }}
  {{- else if eq $auth.method "userpass" }}
  username: {{ required "externalNats.auth.username is required for method=userpass" $auth.username | quote }}
  password: {{ required "externalNats.auth.password is required for method=userpass" $auth.password | quote }}
  {{- else if eq $auth.method "credentials" }}
  credentials: {{ required "externalNats.auth.credentials is required for method=credentials" $auth.credentials | quote }}
  {{- else if eq $auth.method "nkey" }}
  nkeySeed: {{ required "externalNats.auth.nkeySeed is required for method=nkey" $auth.nkeySeed | quote }}
  {{- end }}
  {{- end }}
{{- end }}
