{{- if .Values.gateway.enabled }}
{{- $g := .Values.gateway }}
{{- if not $g.gatewayClassName }}
{{- fail "gateway.gatewayClassName is required when gateway.enabled=true" }}
{{- end }}
{{- if not (or $g.tls.enabled $g.http.enabled) }}
{{- fail "gateway.enabled=true requires at least one listener: set gateway.tls.enabled or gateway.http.enabled" }}
{{- end }}
{{- $hostnames := include "chatto.gatewayHostnames" . | fromYamlArray }}
{{- if not $hostnames }}
{{- fail "gateway.enabled=true requires a hostname: set chatto.url or gateway.hostnames" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "chatto.fullname" . }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
  {{- with $g.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ $g.gatewayClassName }}
  listeners:
    {{- if $g.http.enabled }}
    {{- range $i, $h := $hostnames }}
    - name: {{ include "chatto.listenerName" (dict "prefix" "http" "index" $i "total" (len $hostnames)) }}
      hostname: {{ $h | quote }}
      protocol: HTTP
      port: {{ $g.http.port }}
      allowedRoutes:
        {{- toYaml $g.allowedRoutes | nindent 8 }}
    {{- end }}
    {{- end }}
    {{- if $g.tls.enabled }}
    {{- range $i, $h := $hostnames }}
    - name: {{ include "chatto.listenerName" (dict "prefix" "https" "index" $i "total" (len $hostnames)) }}
      hostname: {{ $h | quote }}
      protocol: HTTPS
      port: {{ $g.tls.port }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ include "chatto.gatewayTlsSecretName" $ }}
      allowedRoutes:
        {{- toYaml $g.allowedRoutes | nindent 8 }}
    {{- end }}
    {{- end }}
{{- end }}
