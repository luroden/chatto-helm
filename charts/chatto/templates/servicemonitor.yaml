{{- if .Values.serviceMonitor.enabled }}
{{- if not .Values.chatto.metrics.enabled }}
{{- fail "serviceMonitor.enabled requires chatto.metrics.enabled=true" }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatto.fullname" . }}-metrics
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
    app.kubernetes.io/component: metrics
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "chatto.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.chatto.metrics.port }}
      targetPort: metrics
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "chatto.fullname" . }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "chatto.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: {{ .Values.chatto.metrics.path }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- with .Values.serviceMonitor.relabelings }}
      relabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
