{{- /*
Sensitive CHATTO_* keys. Auto-generated hex keys are persisted here and reused
across upgrades via `lookup` so sessions and signed URLs survive a `helm
upgrade`. Provide values explicitly (or via *.existingSecret) for GitOps.
*/ -}}
{{- $secretName := include "chatto.configSecretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $prev := dict -}}
{{- if $existing -}}{{- $prev = $existing.data -}}{{- end -}}
{{- define "chatto.reuseOrGen" -}}
{{- /* args: dict prev, string key, string provided */ -}}
{{- if .provided -}}
{{- .provided -}}
{{- else if hasKey .prev .key -}}
{{- index .prev .key | b64dec -}}
{{- else -}}
{{- randAlphaNum 64 | sha256sum -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.secrets.existingSecret }}
  CHATTO_WEBSERVER_COOKIE_SIGNING_SECRET: {{ include "chatto.reuseOrGen" (dict "prev" $prev "key" "CHATTO_WEBSERVER_COOKIE_SIGNING_SECRET" "provided" .Values.secrets.cookieSigningSecret) | quote }}
  CHATTO_WEBSERVER_COOKIE_ENCRYPTION_SECRET: {{ include "chatto.reuseOrGen" (dict "prev" $prev "key" "CHATTO_WEBSERVER_COOKIE_ENCRYPTION_SECRET" "provided" .Values.secrets.cookieEncryptionSecret) | quote }}
  CHATTO_CORE_SECRET_KEY: {{ include "chatto.reuseOrGen" (dict "prev" $prev "key" "CHATTO_CORE_SECRET_KEY" "provided" .Values.secrets.coreSecretKey) | quote }}
  CHATTO_CORE_ASSETS_SIGNING_SECRET: {{ include "chatto.reuseOrGen" (dict "prev" $prev "key" "CHATTO_CORE_ASSETS_SIGNING_SECRET" "provided" .Values.secrets.assetsSigningSecret) | quote }}
  {{- end }}
  {{- if and (eq .Values.chatto.assets.storageBackend "s3") (not .Values.chatto.assets.s3.existingSecret) }}
  CHATTO_CORE_ASSETS_S3_ACCESS_KEY_ID: {{ .Values.chatto.assets.s3.accessKeyId | quote }}
  CHATTO_CORE_ASSETS_S3_SECRET_ACCESS_KEY: {{ .Values.chatto.assets.s3.secretAccessKey | quote }}
  {{- end }}
  {{- if and .Values.chatto.smtp.enabled (not .Values.chatto.smtp.existingSecret) .Values.chatto.smtp.username }}
  CHATTO_SMTP_USERNAME: {{ .Values.chatto.smtp.username | quote }}
  CHATTO_SMTP_PASSWORD: {{ .Values.chatto.smtp.password | quote }}
  {{- end }}
  {{- if and .Values.chatto.push.enabled (not .Values.chatto.push.existingSecret) }}
  CHATTO_PUSH_VAPID_PUBLIC_KEY: {{ required "chatto.push.vapidPublicKey is required when push.enabled" .Values.chatto.push.vapidPublicKey | quote }}
  CHATTO_PUSH_VAPID_PRIVATE_KEY: {{ required "chatto.push.vapidPrivateKey is required when push.enabled" .Values.chatto.push.vapidPrivateKey | quote }}
  {{- end }}
  {{- if and .Values.chatto.livekit.enabled (not .Values.chatto.livekit.existingSecret) }}
  CHATTO_LIVEKIT_API_KEY: {{ required "chatto.livekit.apiKey is required when livekit.enabled" .Values.chatto.livekit.apiKey | quote }}
  CHATTO_LIVEKIT_API_SECRET: {{ required "chatto.livekit.apiSecret is required when livekit.enabled" .Values.chatto.livekit.apiSecret | quote }}
  {{- end }}
  {{- /* Optional: falls back to CHATTO_LIVEKIT_API_SECRET upstream when unset. */}}
  {{- if .Values.chatto.livekit.enabled }}
  {{- with .Values.chatto.livekit.webhook.apiSecret }}
  CHATTO_LIVEKIT_WEBHOOK_API_SECRET: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- range $i, $p := .Values.chatto.auth.providers }}
  {{- with $p.clientSecret }}
  CHATTO_AUTH_PROVIDERS_{{ $i }}_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- end }}
