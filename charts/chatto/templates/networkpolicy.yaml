{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "chatto.fullname" . }}
  labels:
    {{- include "chatto.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chatto.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow client HTTP/WebSocket traffic to the app port from anywhere
    # (ingress controllers, load balancers). Tighten via extraIngress.
    - ports:
        - port: http
          protocol: TCP
    {{- if .Values.chatto.metrics.enabled }}
    - ports:
        - port: metrics
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
